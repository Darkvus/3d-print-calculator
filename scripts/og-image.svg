<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="cube-top" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="cube-right" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="cube-left" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#3730a3" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <!-- Glow for nozzle -->
    <filter id="nozzle-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Outer glow for icon -->
    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.31  0 0 0 0 0.27  0 0 0 0 0.9  0 0 0 0.4 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="90"  x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="616" width="1200" height="14" fill="url(#accent-line)" rx="0"/>

  <!-- ── Big icon (left side) ────────────────────────────────── -->
  <g transform="translate(130, 195)" filter="url(#icon-glow)">
    <!-- Background rounded square -->
    <rect width="240" height="240" rx="48" fill="url(#icon-bg)"/>
    <rect width="240" height="240" rx="48" fill="white" fill-opacity="0.04"/>

    <!-- Rail -->
    <rect x="28" y="46" width="184" height="14" rx="7" fill="white" fill-opacity="0.55"/>

    <!-- Extruder body -->
    <rect x="100" y="36" width="40" height="36" rx="9" fill="white" fill-opacity="0.9"/>
    <line x1="110" y1="46" x2="130" y2="46" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>

    <!-- Nozzle tip -->
    <path d="M103 72 L137 72 L130 88 L110 88 Z" fill="white" fill-opacity="0.95" filter="url(#nozzle-glow)"/>

    <!-- Filament drop -->
    <line x1="120" y1="88" x2="120" y2="96" stroke="#7dd3fc" stroke-width="8" stroke-linecap="round"/>

    <!-- Cube top face -->
    <polygon points="120,96 168,120 120,144 72,120" fill="url(#cube-top)"/>
    <!-- Cube right face -->
    <polygon points="120,144 168,120 168,176 120,200" fill="url(#cube-right)"/>
    <!-- Cube left face -->
    <polygon points="72,120 120,144 120,200 72,176" fill="url(#cube-left)"/>

    <!-- Layer lines right -->
    <line x1="120" y1="160" x2="168" y2="136" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
    <line x1="120" y1="180" x2="168" y2="156" stroke="white" stroke-width="2.5" stroke-opacity="0.35"/>
    <!-- Layer lines left -->
    <line x1="72" y1="136" x2="120" y2="160" stroke="white" stroke-width="2.5" stroke-opacity="0.25"/>
    <line x1="72" y1="156" x2="120" y2="180" stroke="white" stroke-width="2.5" stroke-opacity="0.25"/>

    <!-- Edge highlights -->
    <line x1="120" y1="96"  x2="168" y2="120" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="120" y1="96"  x2="72"  y2="120" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
    <line x1="168" y1="120" x2="168" y2="176" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="72"  y1="120" x2="72"  y2="176" stroke="white" stroke-width="2" stroke-opacity="0.4"/>
    <line x1="120" y1="200" x2="168" y2="176" stroke="white" stroke-width="2" stroke-opacity="0.35"/>
    <line x1="120" y1="200" x2="72"  y2="176" stroke="white" stroke-width="2" stroke-opacity="0.35"/>

    <!-- Price badge -->
    <circle cx="210" cy="40" r="30" fill="#0ea5e9"/>
    <text x="210" y="52" text-anchor="middle" font-size="34" font-weight="bold" fill="white" font-family="system-ui, sans-serif">$</text>
  </g>

  <!-- ── Text (right side) ───────────────────────────────────── -->
  <!-- App name -->
  <text x="450" y="265" font-size="96" font-weight="800" fill="white" font-family="system-ui, -apple-system, sans-serif" letter-spacing="-3">Printimator</text>

  <!-- Accent underline -->
  <rect x="450" y="285" width="520" height="5" rx="2.5" fill="url(#accent-line)"/>

  <!-- Tagline -->
  <text x="450" y="350" font-size="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-weight="400">Calcula el costo real de tus</text>
  <text x="450" y="398" font-size="38" fill="#94a3b8" font-family="system-ui, sans-serif" font-weight="400">impresiones 3D</text>

  <!-- Feature pills -->
  <g transform="translate(450, 450)">
    <!-- Pill 1 -->
    <rect width="158" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="79" y="28" text-anchor="middle" font-size="22" fill="#7dd3fc" font-family="system-ui, sans-serif">Multi-filamento</text>

    <!-- Pill 2 -->
    <rect x="170" width="128" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="234" y="28" text-anchor="middle" font-size="22" fill="#a5b4fc" font-family="system-ui, sans-serif">PDF · CSV</text>

    <!-- Pill 3 -->
    <rect x="310" width="158" height="44" rx="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <text x="389" y="28" text-anchor="middle" font-size="22" fill="#86efac" font-family="system-ui, sans-serif">Compartir URL</text>
  </g>

  <!-- URL / brand footer -->
  <text x="450" y="578" font-size="26" fill="#475569" font-family="system-ui, sans-serif">github.com/Darkvus · 3D Print Cost Calculator</text>
</svg>
